<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - MaBoutique</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="/" class="sidebar-logo">MaBoutique</a>
    
    <div class="sidebar-sections">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Principal</div>
        <a href="#" class="sidebar-link active" onclick="loadPage('dashboard')">
          📊 Tableau de bord
        </a>
        <a href="#" class="sidebar-link" onclick="loadPage('orders')">
          📦 Commandes
          <span class="sidebar-link-badge" id="orders-badge">0</span>
        </a>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">Catalogue</div>
        <a href="#" class="sidebar-link" onclick="loadPage('products')">
          🛍️ Produits
        </a>
        <a href="#" class="sidebar-link" onclick="loadPage('add-product')">
          ➕ Ajouter produit
        </a>
        <a href="#" class="sidebar-link" onclick="loadPage('promotions')">
          🏷️ Promotions
        </a>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">Analyse</div>
        <a href="#" class="sidebar-link" onclick="loadPage('statistics')">
          📈 Statistiques
        </a>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">Paramètres</div>
        <a href="#" class="sidebar-link" onclick="loadPage('settings')">
          ⚙️ Paramètres
        </a>
      </div>
    </div>
    
    <div class="sidebar-footer">
      <a href="/" class="sidebar-footer-link" target="_blank">👁️ Voir la boutique</a>
    </div>
  </aside>

  <!-- Topbar -->
  <div class="admin-topbar">
    <h1 class="topbar-title" id="page-title">Tableau de bord</h1>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <input type="text" placeholder="Rechercher..." id="search-input">
      </div>
      <button class="topbar-button" onclick="loadPage('add-product')">+ Nouveau produit</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="admin-main">
    <div class="page-container" id="content"></div>
  </div>

  <!-- Scripts pour i18n et produits -->
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/products.js"></script>
  
  <script>
    let currentPage = 'dashboard';

    function loadPage(page) {
      currentPage = page;
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      event.target.closest('.sidebar-link').classList.add('active');
      
      const content = document.getElementById('content');
      const title = document.getElementById('page-title');
      
      switch(page) {
        case 'dashboard':
          title.textContent = 'Tableau de bord';
          content.innerHTML = renderDashboard();
          break;
        case 'products':
          title.textContent = 'Produits';
          content.innerHTML = renderProductsPage();
          break;
        case 'add-product':
          title.textContent = 'Ajouter un produit';
          content.innerHTML = renderProductForm();
          break;
        case 'orders':
          title.textContent = 'Commandes';
          content.innerHTML = renderOrdersPage();
          break;
        case 'promotions':
          title.textContent = 'Promotions';
          content.innerHTML = renderPromotionsPage();
          break;
        case 'statistics':
          title.textContent = 'Statistiques';
          content.innerHTML = renderStatisticsPage();
          break;
        case 'settings':
          title.textContent = 'Paramètres';
          content.innerHTML = renderSettingsPage();
          break;
      }
    }

    function renderDashboard() {
      const orders = getOrders();
      const products = getProducts();
      const revenue = orders.reduce((sum, o) => sum + o.total, 0);
      const lowStock = products.filter(p => p.stock <= 3).length;
      
      return `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Chiffre d'affaires</div>
            <div class="stat-value">${revenue.toFixed(2)}€</div>
            <div class="stat-change">+12% ce mois</div>
          </div>
          
          <div class="stat-card success">
            <div class="stat-label">Commandes</div>
            <div class="stat-value">${orders.length}</div>
            <div class="stat-change">dernières 30j</div>
          </div>
          
          <div class="stat-card info">
            <div class="stat-label">Produits actifs</div>
            <div class="stat-value">${products.filter(p => p.active).length}</div>
            <div class="stat-change">/${products.length} total</div>
          </div>
          
          <div class="stat-card danger">
            <div class="stat-label">Stock faible</div>
            <div class="stat-value">${lowStock}</div>
            <div class="stat-change">≤3 unités</div>
          </div>
        </div>

        <div class="chart-container">
          <h3>Commandes récentes</h3>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Client</th>
                  <th>Total</th>
                  <th>Statut</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${orders.slice(-5).reverse().map(o => `
                  <tr>
                    <td>${o.id}</td>
                    <td>${o.customer.name}</td>
                    <td>${o.total.toFixed(2)}€</td>
                    <td><span class="badge">${o.status}</span></td>
                    <td>${new Date(o.created).toLocaleDateString()}</td>
                    <td><button class="btn btn-small" onclick="loadPage('orders')">Voir</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderProductsPage() {
      const products = getProducts();
      
      return `
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Nom</th>
                <th>Catégorie</th>
                <th>Prix</th>
                <th>Stock</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td><img src="${p.images?.[0]}" style="width: 48px; height: 48px; object-fit: cover; border-radius: 4px;" onerror="this.src='https://via.placeholder.com/48'"></td>
                  <td><strong>${p.name.fr}</strong></td>
                  <td>${p.category}</td>
                  <td>${p.price}€</td>
                  <td><span class="badge ${p.stock <= 3 ? 'badge-danger' : p.stock <= 10 ? 'badge-warning' : 'badge-success'}">${p.stock}</span></td>
                  <td><span class="badge ${p.active ? 'badge-success' : 'badge-danger'}">${p.active ? 'Actif' : 'Inactif'}</span></td>
                  <td>
                    <button class="btn btn-small" onclick="editProduct(${p.id})">Éditer</button>
                    <button class="btn btn-small btn-danger" onclick="if(confirm('Supprimer?')) { deleteProduct(${p.id}); location.reload(); }">Supprimer</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderProductForm(productId = null) {
      const product = productId ? getProductById(productId) : null;
      
      return `
        <div class="form-section">
          <h3>${product ? 'Modifier produit' : 'Ajouter un produit'}</h3>
          
          <form onsubmit="handleSaveProduct(event, ${productId || 'null'})">
            <div class="form-group-inline">
              <div>
                <label>Nom FR</label>
                <input type="text" name="name_fr" value="${product?.name.fr || ''}" required>
              </div>
              <div>
                <label>Nom AR</label>
                <input type="text" name="name_ar" value="${product?.name.ar || ''}" required>
              </div>
              <div>
                <label>Nom EN</label>
                <input type="text" name="name_en" value="${product?.name.en || ''}" required>
              </div>
            </div>

            <div class="form-group-inline">
              <div>
                <label>Desc FR</label>
                <textarea name="desc_fr" required>${product?.description.fr || ''}</textarea>
              </div>
              <div>
                <label>Desc AR</label>
                <textarea name="desc_ar" required>${product?.description.ar || ''}</textarea>
              </div>
              <div>
                <label>Desc EN</label>
                <textarea name="desc_en" required>${product?.description.en || ''}</textarea>
              </div>
            </div>

            <div class="form-row">
              <div>
                <label>Prix (€)</label>
                <input type="number" name="price" step="0.01" value="${product?.price || ''}" required>
              </div>
              <div>
                <label>Prix ancien (€)</label>
                <input type="number" name="price_old" step="0.01" value="${product?.price_old || ''}">
              </div>
              <div>
                <label>Stock</label>
                <input type="number" name="stock" value="${product?.stock || 0}" required>
              </div>
            </div>

            <div class="form-row">
              <div>
                <label>Catégorie</label>
                <input type="text" name="category" value="${product?.category || ''}" required>
              </div>
              <div>
                <label>URL Images (virgule séparées)</label>
                <input type="text" name="images" value="${product?.images?.join(',') || ''}">
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem;">
              <label class="toggle">
                <input type="checkbox" name="active" ${product?.active !== false ? 'checked' : ''}>
                <span class="toggle-switch"></span>
                <span>Actif</span>
              </label>
              <label class="toggle">
                <input type="checkbox" name="featured" ${product?.featured ? 'checked' : ''}>
                <span class="toggle-switch"></span>
                <span>Mis en avant</span>
              </label>
              <label class="toggle">
                <input type="checkbox" name="promo" ${product?.promo ? 'checked' : ''}>
                <span class="toggle-switch"></span>
                <span>Promo</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Enregistrer</button>
          </form>
        </div>
      `;
    }

    function handleSaveProduct(event, productId) {
      event.preventDefault();
      
      const formData = new FormData(event.target);
      const data = {
        name: {
          fr: formData.get('name_fr'),
          ar: formData.get('name_ar'),
          en: formData.get('name_en')
        },
        description: {
          fr: formData.get('desc_fr'),
          ar: formData.get('desc_ar'),
          en: formData.get('desc_en')
        },
        price: parseFloat(formData.get('price')),
        price_old: formData.get('price_old') ? parseFloat(formData.get('price_old')) : null,
        stock: parseInt(formData.get('stock')),
        category: formData.get('category'),
        images: formData.get('images').split(',').map(s => s.trim()),
        active: formData.get('active') === 'on',
        featured: formData.get('featured') === 'on',
        promo: formData.get('promo') === 'on'
      };
      
      if (productId) {
        updateProduct(productId, data);
      } else {
        addProduct(data);
      }
      
      alert('Produit enregistré avec succès!');
      loadPage('products');
    }

    function editProduct(id) {
      currentPage = 'edit-product-' + id;
      document.getElementById('page-title').textContent = 'Modifier produit';
      document.getElementById('content').innerHTML = renderProductForm(id);
    }

    function renderOrdersPage() {
      const orders = getOrders();
      
      return `
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Téléphone</th>
                <th>Wilaya</th>
                <th>Total</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(o => `
                <tr>
                  <td>${o.id}</td>
                  <td>${o.customer?.name || o.name}</td>
                  <td>${o.customer?.phone || o.phone}</td>
                  <td>${o.customer?.wilaya || o.wilaya}</td>
                  <td>${o.total.toFixed(2)}€</td>
                  <td>
                    <select onchange="updateOrderStatus('${o.id}', this.value)">
                      <option ${o.status === 'pending' ? 'selected' : ''}>pending</option>
                      <option ${o.status === 'confirmed' ? 'selected' : ''}>confirmed</option>
                      <option ${o.status === 'shipped' ? 'selected' : ''}>shipped</option>
                      <option ${o.status === 'delivered' ? 'selected' : ''}>delivered</option>
                      <option ${o.status === 'cancelled' ? 'selected' : ''}>cancelled</option>
                    </select>
                  </td>
                  <td>${new Date(o.created).toLocaleDateString()}</td>
                  <td><button class="btn btn-small" onclick="showOrderDetail('${o.id}')">Détail</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function updateOrderStatus(orderId, status) {
      updateOrderStatus(orderId, status);
      alert('Statut mis à jour!');
      loadPage('orders');
    }

    function renderPromotionsPage() {
      const promos = getPromos();
      
      return `
        <div class="form-section">
          <h3>Ajouter un code promo</h3>
          <form onsubmit="handleAddPromo(event)">
            <div class="form-row">
              <input type="text" name="code" placeholder="Code" required>
              <select name="type" required>
                <option value="percentage">Pourcentage (%)</option>
                <option value="fixed">Montant fixe (€)</option>
              </select>
              <input type="number" name="value" step="0.01" placeholder="Valeur" required>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
          </form>
        </div>

        <div class="chart-container">
          <h3>Codes actifs</h3>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Réduction</th>
                  <th>Type</th>
                  <th>Actif</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${promos.map(p => `
                  <tr>
                    <td>${p.code}</td>
                    <td>${p.value}</td>
                    <td>${p.type === 'percentage' ? '%' : '€'}</td>
                    <td><input type="checkbox" ${p.active ? 'checked' : ''} onchange="togglePromo('${p.code}', this.checked)"></td>
                    <td><button class="btn btn-small btn-danger" onclick="deletePromo('${p.code}')">Supprimer</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function handleAddPromo(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const promos = getPromos();
      promos.push({
        code: formData.get('code'),
        type: formData.get('type'),
        value: parseFloat(formData.get('value')),
        active: true
      });
      savePromos(promos);
      alert('Code promo ajouté!');
      loadPage('promotions');
    }

    function renderStatisticsPage() {
      const products = getProducts();
      const orders = getOrders();
      
      const stockByProduct = products.slice(0, 5).map(p => ({
        name: p.name.fr,
        stock: p.stock
      }));
      
      return `
        <div class="chart-container">
          <h3>Stock par produit</h3>
          <div style="display: grid; gap: 1rem;">
            ${stockByProduct.map(p => `
              <div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                  <span>${p.name}</span>
                  <span style="color: var(--gold); font-weight: bold;">${p.stock}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${Math.min(p.stock * 2, 100)}%"></div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderSettingsPage() {
      return `
        <div class="form-section">
          <h3>Paramètres de la boutique</h3>
          <form onsubmit="handleSaveSettings(event)">
            <div class="form-row">
              <input type="text" placeholder="Nom boutique" value="MaBoutique">
              <input type="email" placeholder="Email" value="info@maboutique.dz">
            </div>
            
            <div class="form-row">
              <input type="text" placeholder="Stripe Payment Link" id="stripe_link">
              <input type="text" placeholder="Formspree ID" id="formspree_id">
            </div>
            
            <div class="form-row">
              <input type="number" placeholder="Taux EUR/DZD" value="145" step="1">
              <input type="tel" placeholder="WhatsApp" value="+213 XXX XXX XXX">
            </div>
            
            <div class="form-row">
              <input type="text" placeholder="CCP" value="XXXXX XXXXX XXXXX">
              <input type="text" placeholder="RIB" value="XXXXX XXXXX XXXXX">
            </div>
            
            <textarea placeholder="Texte bannière promo" style="width: 100%; margin-bottom: 1rem;"></textarea>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Enregistrer</button>
            <button type="button" class="btn btn-danger" onclick="if(confirm('Êtes-vous sûr? Cela supprimera tous les produits.')) { localStorage.removeItem('shop_products'); alert('Réinitialisé!'); }" style="width: 100%;">Réinitialiser tous les produits</button>
          </form>
        </div>
      `;
    }

    function handleSaveSettings(event) {
      event.preventDefault();
      localStorage.setItem('stripe_link', document.getElementById('stripe_link').value);
      localStorage.setItem('formspree_id', document.getElementById('formspree_id').value);
      alert('Paramètres enregistrés!');
    }

    // Init
    window.addEventListener('DOMContentLoaded', () => {
      loadPage('dashboard');
      document.getElementById('orders-badge').textContent = getOrders().length;
    });
  </script>
</body>
</html>
